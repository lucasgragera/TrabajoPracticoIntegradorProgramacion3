<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Food Store</title>
</head>

<body class="auth-page">
    <div class="login-container">
        <div class="brand-title">Food Store</div>
        <h1>Iniciar Sesión</h1>

        <form id="form">
            <div id="error-message"
                style="color: #d32f2f; background-color: #ffebee; padding: 10px; border-radius: 5px; display: none; margin-bottom: 15px; font-weight: bold; font-size: 0.9em; border: 1px solid #ffcdd2;">
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" autocomplete="off" placeholder="ejemplo@correo.com"
                    required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" autocomplete="off" placeholder="********" required>
            </div>

            <div class="form-group">
                <label for="rol">Rol:</label>
                <select name="rol" id="rol" required>
                    <option value="" disabled selected>Seleccione un rol...</option>
                    <option value="client">Cliente</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>

            <button type="submit">Ingresar</button>
        </form>

        <div class="registro-link">
            <p>¿No tienes una cuenta? <a href="/src/pages/auth/registro/registro.html">Regístrate aquí</a></p>
        </div>
    </div>

    <script type="module" src="../../../main.ts"></script>
    <script type="module" src="./login.ts"></script>
</body>

</html>
