<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Food Store</title>
</head>

<body class="auth-page">

    <div class="registro-container">
        <div class="brand-title">Food Store</div>
        <h1>Crear Cuenta</h1>

        <form id="registroForm">
            <div id="error-message"
                style="color: #d32f2f; background-color: #ffebee; padding: 10px; border-radius: 5px; display: none; margin-bottom: 15px; font-weight: bold; font-size: 0.9em; border: 1px solid #ffcdd2;">
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="********" required>
            </div>

            <div class="form-group">
                <label for="role">Tipo de Cuenta:</label>
                <select name="role" id="role" required>
                    <option value="client">Cliente</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>

            <button type="submit">Registrarse</button>
        </form>

        <div class="login-link">
            <p>¿Ya tienes una cuenta? <a href="/src/pages/auth/login/login.html">Inicia sesión</a></p>
        </div>
    </div>

    <script type="module" src="../../../main.ts"></script>
    <script type="module" src="./registro.ts"></script>
</body>

</html>
