<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo - Food Store</title>
</head>

<body>
    <header>
        <a href="#" class="brand-title">Food Store</a>
        <nav>
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="/src/pages/client/orders/orders.html">Mis Pedidos</a></li>
                <li>
                    <a href="../../../../src/pages/cart/cart.html">
                        🛒 Carrito <span id="contador-carrito" style="display: none;">0</span>
                    </a>
                </li>
                <li><a href="/src/pages/admin/home/home.html" id="link-panel-admin" style="display: none;">Panel
                        Admin</a></li>
                <li><button id="logoutButton">Logout</button></li>
            </ul>
        </nav>
    </header>

    <main class="catalogo-main">
        <button id="toggle-sidebar">☰ Categorías</button>

        <aside>
            <h2>Categorías</h2>
            <ul id="lista-categorias" style="list-style: none; padding: 0; margin: 0;"></ul>
        </aside>

        <section class="catalogo-section">
            <div class="search-container">
                <label for="buscarProducto">Buscar Productos:</label>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <input id="buscarProducto" type="text" placeholder="Ej: Hamburguesa, Gaseosa..." style="flex: 1;">
                    <select id="ordenarProductos">
                        <option value="default">Ordenar por...</option>
                        <option value="az">Nombre A-Z</option>
                        <option value="za">Nombre Z-A</option>
                        <option value="precio-asc">Precio Menor a Mayor</option>
                        <option value="precio-desc">Precio Mayor a Menor</option>
                    </select>
                </div>
                <p id="contador-resultados" style="margin-top: 10px; font-size: 0.9em; color: #666;"></p>
            </div>

            <h2>Nuestro Catálogo</h2>
            <div id="contenedor-productos"></div>
            <p id="mensaje-no-resultados"
                style="display: none; color: #d32f2f; background-color: #ffebee; padding: 15px; border-radius: 5px; font-weight: bold; margin-top: 20px; border: 1px solid #ffcdd2;">
                ❌ No se encontraron productos.
            </p>
        </section>
    </main>

    <footer>
        <h4>© 2026 Food Store. Todos los derechos reservados</h4>
        <h3>Contactanos: <a href="mailto:foodstore@gmail.com">foodstore@gmail.com</a></h3>
    </footer>

    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/pages/cart/catalogo.ts"></script>
    <script type="module" src="./home.ts"></script>
</body>

</html>
